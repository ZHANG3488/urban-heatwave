
# Run analysis.py and plot.py from the repository root so that these

paths:
  # Repository root
  unified_root: .

  # Raw/upstream inputs used only when running analysis.py
  pair_csv: data/annual_ml_dataset_2024_new.csv
  pair_fallback: data/annual_ml_dataset_2024_new.csv
  station_metadata: data/Extract_Final_Integrated_2023.csv
  isd_base_dir: data/isd_data
  era5_station_dir: data/era5_station_daily
  koppen_geiger_tif: data/koppen_geiger/koppen_geiger_0p00833333.tif
  continent_shapefile: data/continents/World_Continents.shp
  building_volume_csv: data/stations_building_volume_100m.csv

  # Outputs generated inside the repository
  analysis_output_dir: analysis/main_multiyear
  figure1_output_dir: plot_data/fig1_n

analysis:
  years: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  bootstrap_n: 1000
  random_seed: 42
  n_workers: null
  use_era5_climatology: true
  min_loyo_ref_years: 5
  building_volume_radius: 1000m
